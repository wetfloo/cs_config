echo ":: Loading keybinds..."

// Inventory
bind "1" "wpn_primary"
bind "2" "wpn_secondary"
bind "4" "wpn_melee"
bind "5" "wpn_grenades"
bind "6" "wpn_bomb"
bind "z" "wpn_smoke"
bind "x" "wpn_flash"
bind "MOUSE5" "wpn_he"
// Flashlight
bind "MOUSE3" "wpn_torch"
bind "n" "wpn_nightvision"

// Run, think, shoot, live
bind "e" "+forward"
bind "s" "+moveleft"
bind "d" "+back"
bind "f" "+moveright"
bind "r" "+use"
bind "t" "+reload"
bind "h" "drop"
bind "SHIFT" "+speed"
bind "SPACE" "+jump"
bind "MWHEELUP" "+jump"
bind "CTRL" "+duck"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"

// Nasty jumpcrouch
bind "MOUSE4" "+hj"

// Buy (and sell?)
bind "b" "buy"
bind "F3" "autobuy"
bind "F4" "rebuy"

bind "," "primammo"
bind "." "secammo"

bind "KP_END" "ak47;m4a1;primammo" // Numpad 1
bind "KP_DOWNARROW" "galil;famas;primammo" // Numpad 2
bind "KP_PGDN" "mp5;primammo" // Numpad 3
bind "KP_LEFTARROW" "deagle;secammo" // Numpad 4
bind "KP_INS" "defuser" // Numpad 0
bind "KP_PGUP" "hegren;flash;sgren;flash" // Numpad 9
bind "KP_MINUS" "vest" // Numpad -
bind "KP_PLUS" "vesthelm" // Numpad +

// UI
bind "ESCAPE" "cancelselect"
bind "TAB" "+showscores"
bind "F5" "toggleconsole"

// Misc
bind "c" "+voicerecord"
bind "ENTER" "messagemode2"
bind "'" "messagemode"
bind "PAUSE" "pause"

echo ":: Keybinds loaded!"
