alias "reexec" "exec cs1cfg/autoexec.cfg;"


exec cs1cfg/include/100_input/main.cfg
exec cs1cfg/include/200_hud/main.cfg
exec cs1cfg/include/300_sound/main.cfg
exec cs1cfg/include/400_video/main.cfg
exec cs1cfg/include/500_misc/main.cfg

alias "w" "wait;"
alias "w2" "wait;wait;"
alias "w4" "w2;w2;"
alias "w8" "w4;w4;"

// Nasty jumpcrouch
alias "+hj" "+jump;+duck;"
alias "-hj" "-jump;-duck;"

alias "rr" "record demo;"

alias "practice" "exec cs1cfg/include/function/practice.cfg;"

// ================================
// Inventory
// ================================
// !!
alias "hand_dyn_toggle" "hand_dyn_on;"
alias "hand_dyn_on" "exec cs1cfg/include/toggle/hand_dyn/on.cfg;echo Enabled dynamic hand switching per-slot.;"
alias "hand_dyn_off" "exec cs1cfg/include/toggle/hand_dyn/off.cfg;echo Disabled dynamic hand switching per-slot.;"
hand_dyn_toggle

play items/nvg_on
echo "Loaded autoexec.cfg"
