// Keep the lines below at the top to make sure
// that the movement gets desubticked (or subticked, if disabled) correctly
alias desub_disable "exec cs2cfg/include/function/desub_disable"
alias desub_enable "exec cs2cfg/include/function/desub_enable"
desub_disable

exec cs2cfg/include/0_input/main
exec cs2cfg/include/1_hud/main
exec cs2cfg/include/2_sound/main
exec cs2cfg/include/3_misc/main

play "sounds/player/playerping" // If you hear player ping on game start, that means that everything will be ok

echo "Loaded autoexec.cfg"
host_writeconfig
