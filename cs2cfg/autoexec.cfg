con_enable 1  // Enable dev console
developer 0

log_flags "InputService" "+donotecho"

exec cs2cfg/include/100_input/main.cfg
exec cs2cfg/include/200_hud/main.cfg
exec cs2cfg/include/300_sound/main.cfg
exec cs2cfg/include/400_misc/main.cfg

// Convenience commands
alias "reexec" "exec cs2cfg/autoexec.cfg"
alias "exit" "quit"
alias "disc" "reexec; disconnect"

// Universal key to change radar scale/toggle util crosshair
alias "action_key_q" "toggleradarscale"

// Desubtick
alias "desub_toggle" "desub_off" // !!
alias "desub_on" "exec cs2cfg/include/function/desub_on.cfg; alias "desub_toggle" "desub_off"; cl_hud_color 9; echo "De-subticking enabled."" // Toxic green HUD
alias "desub_off" "exec cs2cfg/include/function/desub_off.cfg; alias "desub_toggle" "desub_on"; cl_hud_color 11; echo "De-subticking disabled."" // Soft pink HUD
desub_toggle

// Inventory
alias "wpn_primary" "switchhandsleft; slot1"
alias "wpn_secondary" "switchhandsleft; slot2"
alias "wpn_melee" "switchhandsright; slot3"
alias "wpn_grenades" "slot4"
alias "wpn_bomb" "slot5"
alias "wpn_health" "slot12"
alias "wpn_decoy" "slot9"
alias "wpn_smoke" "slot8"
alias "wpn_flash" "slot7"
alias "wpn_molotov" "slot10"
alias "wpn_he" "slot6"
alias "wpn_taser" "slot11"
alias "+dropbomb" "switchhandsright; wpn_melee; wpn_bomb"
alias "-dropbomb" "drop; say_team "I dropped the bomb."; wpn_melee"

// Set autobuy
cl_autobuy "vesthelm vest m4a1 ak47 famas galilar mp9 mac10 smokegrenade flashbang defuser hegrenade molotov incgrenade flashbang"

// Sell back aliases
alias "sellback_taser" "sellback 34"
alias "sellback_defuser" "sellback 35"
alias "sellback_helm" "sellback 33"
alias "sellback_vest" "sellback 32"
alias "sellback_vesthelm" "sellback_helm; sellback_vest"
alias "sellback_flash" "sellback 26"
alias "sellback_smoke" "sellback 27"
alias "sellback_he" "sellback 28"
alias "sellback_molotov" "sellback 29"
alias "sellback_decoy" "sellback 30"
alias "sellback_1_1" "sellback 2"
alias "sellback_1_2" "sellback 3"
alias "sellback_1_3" "sellback 4"
alias "sellback_1_4" "sellback 5"
alias "sellback_1_5" "sellback 6"
alias "sellback_2_1" "sellback 8"
alias "sellback_2_2" "sellback 9"
alias "sellback_2_3" "sellback 10"
alias "sellback_2_4" "sellback 11"
alias "sellback_2_5" "sellback 12"
alias "sellback_3_1" "sellback 14"
alias "sellback_3_2" "sellback 15"
alias "sellback_3_3" "sellback 16"
alias "sellback_3_4" "sellback 17"
alias "sellback_3_5" "sellback 18"

// Common messages
alias "s_window" "buy smokegrenade; say_team "I smoke window.""
alias "s_conn" "buy smokegrenade; say_team "I smoke conn.""
alias "s_short" "buy smokegrenade; say_team "I smoke short.""
alias "s_long" "buy smokegrenade; say_team "I smoke long.""
alias "s_jungle" "buy smokegrenade; say_team "I smoke jungle.""
alias "s_xbox" "buy smokegrenade; say_team "I smoke xbox.""
alias "s_monster" "buy smokegrenade; say_team "I smoke monster.""
alias "s_heaven" "buy smokegrenade; say_team "I smoke heaven.""
alias "s_donut" "buy smokegrenade; say_team "I smoke donut.""
alias "s_ct" "buy smokegrenade; say_team "I smoke CT.""
alias "s_bdoors" "buy smokegrenade; say_team "I smoke B doors.""

// Live crosshair settings
alias "crosshair_recoil_toggle" "crosshair_recoil_off" // !!
alias "crosshair_recoil_on" "exec cs2cfg/include/function/crosshair_recoil_on.cfg; alias "crosshair_recoil_toggle" "crosshair_recoil_off"; echo "Crosshair recoil following enabled.""
alias "crosshair_recoil_off" "exec cs2cfg/include/function/crosshair_recoil_off.cfg; alias "crosshair_recoil_toggle" "crosshair_recoil_on"; echo "Crosshair recoil following disabled.""
crosshair_recoil_toggle
alias "crosshair_util_toggle" "crosshair_util_off" // !!
alias "crosshair_util_on" "exec cs2cfg/include/function/crosshair_util_on.cfg; alias "crosshair_util_toggle" "crosshair_util_off"; echo "Lineup utility crosshair enabled.""
alias "crosshair_util_off" "exec cs2cfg/include/function/crosshair_util_off.cfg; alias "crosshair_util_toggle" "crosshair_util_on"; echo "Lineup utility crosshair disabled.""
crosshair_util_toggle
alias "crosshair_big" "exec cs2cfg/include/function/crosshair_big.cfg; unbind "ALT"; echo "Making your crosshair big, type `reexec` to reset everything.""

// Toggle util crosshair when a grenade is being held
alias "+attack_" "+attack; crosshair_util_off; alias "action_key_q" "crosshair_util_toggle"; spec_next"
alias "-attack_" "-attack; crosshair_util_off; alias "action_key_q" "toggleradarscale""
alias "+attack2_" "+attack2; crosshair_util_off; alias "action_key_q" "crosshair_util_toggle"; spec_prev"
alias "-attack2_" "-attack2; crosshair_util_off; alias "action_key_q" "toggleradarscale""

// Show the CS2's netgraph when tabbing
alias "telemetry_full" "exec cs2cfg/include/function/telemetry_full.cfg"
alias "telemetry_clean" "exec cs2cfg/include/function/telemetry_clean.cfg" // !!
telemetry_clean
alias "+showscores_netgraph" "+showscores; telemetry_full"
alias "-showscores_netgraph" "-showscores; telemetry_clean"

// Sound
alias "music_toggle" "music_on" // !!
alias "music_on" "snd_musicvolume 1.0; alias "music_toggle" "music_off"; echo "Music enabled.""
alias "music_off" "snd_musicvolume 0.0; alias "music_toggle" "music_on"; echo "Music disabled.""
music_toggle
alias "voice_toggle" "voice_off" // !!
alias "voice_on" "exec cs2cfg/include/function/voice_on.cfg; alias "voice_toggle" "voice_off"; echo "Voice enabled.""
alias "voice_off" "exec cs2cfg/include/function/voice_off.cfg; alias "voice_toggle" "voice_on"; echo "Voice disabled.""
voice_toggle
alias "volume_toggle" "volume_on" // !!
alias "volume_on" "volume 1.0; alias "volume_toggle" "volume_off"; echo "Game sound enabled.""
alias "volume_off" "volume 0.0; exec cs2cfg/include/function/voice_off.cfg; alias "volume_toggle" "volume_on"; echo "Game sound disabled.""
volume_toggle

// Practice
alias "clear_util" "exec cs2cfg/include/function/clear_util.cfg"
alias "practice" "exec cs2cfg/include/function/practice.cfg"

play "sounds/player/playerping" // If you hear player ping on game start, that means that everything will be ok

echo "Loaded autoexec.cfg"
host_writeconfig
