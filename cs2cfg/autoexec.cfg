con_enable 1  // Enable dev console
developer 0

exec cs2cfg/include/100_input/main
exec cs2cfg/include/200_hud/main
exec cs2cfg/include/300_sound/main
exec cs2cfg/include/400_misc/main

// Convenience commands
alias "reexec" "exec cs2cfg/autoexec"
alias "exit" "quit"
alias "disc" "reexec; disconnect"

// Universal key to change radar scale/toggle util crosshair
alias "qcmd" "toggleradarscale"

// Desubtick
alias "desub_toggle" "desub_off" // !!
alias "desub_on" "exec cs2cfg/include/function/desub_on; alias "desub_toggle" "desub_off"; cl_hud_color 9; echo "De-subticking enabled."" // Toxic green HUD
alias "desub_off" "exec cs2cfg/include/function/desub_off; alias "desub_toggle" "desub_on"; cl_hud_color 11; echo "De-subticking disabled."" // Soft pink HUD
desub_toggle

// Inventory
alias "wpn_primary" "switchhandsleft; slot1"
alias "wpn_secondary" "switchhandsleft; slot2"
alias "wpn_melee" "switchhandsright; slot3"
alias "wpn_grenades" "slot4"
alias "wpn_bomb" "slot5"
alias "wpn_decoy" "buy decoy; slot9"
alias "wpn_smoke" "buy smokegrenade; slot8"
alias "wpn_flash" "buy flashbang; buy flashbang; slot7"
alias "wpn_molotov" "buy molotov; buy incgrenade; slot10"
alias "wpn_he" "buy hegrenade; slot6"
alias "wpn_health" "slot12"
alias "wpn_taser" "buy taser; switchhandsright; slot11"
alias "+dropbomb" "switchhandsright; wpn_melee; wpn_bomb"
alias "-dropbomb" "drop; say_team "I dropped the bomb."; wpn_melee"

// Live crosshair settings
alias "crosshair_recoil_toggle" "crosshair_recoil_on" // !!
alias "crosshair_recoil_on" "exec cs2cfg/include/function/crosshair_recoil_on; alias "crosshair_recoil_toggle" "crosshair_recoil_off"; echo "Crosshair recoil following enabled.""
alias "crosshair_recoil_off" "exec cs2cfg/include/function/crosshair_recoil_off; alias "crosshair_recoil_toggle" "crosshair_recoil_on"; echo "Crosshair recoil following disabled.""
crosshair_recoil_toggle
alias "crosshair_util_toggle" "crosshair_util_off" // !!
alias "crosshair_util_on" "exec cs2cfg/include/function/crosshair_util_on; alias "crosshair_util_toggle" "crosshair_util_off""
alias "crosshair_util_off" "exec cs2cfg/include/function/crosshair_util_off; alias "crosshair_util_toggle" "crosshair_util_on""
crosshair_util_toggle

// Toggle util crosshair when a grenade is being held
alias "+attack_" "+attack; crosshair_util_off; alias "qcmd" "crosshair_util_toggle"; spec_next"
alias "-attack_" "-attack; crosshair_util_off; alias "qcmd" "toggleradarscale""
alias "+attack2_" "+attack2; crosshair_util_off; alias "qcmd" "crosshair_util_toggle"; spec_prev"
alias "-attack2_" "-attack2; crosshair_util_off; alias "qcmd" "toggleradarscale""

// Show the CS2's netgraph when tabbing
alias "telemetry_full" "exec cs2cfg/include/function/telemetry_full"
alias "telemetry_clean" "exec cs2cfg/include/function/telemetry_clean" // !!
telemetry_clean
alias "+showscores_netgraph" "+showscores; telemetry_full"
alias "-showscores_netgraph" "-showscores; telemetry_clean"

// Sound
alias "music_toggle" "music_on" // !!
alias "music_on" "snd_musicvolume 1.0; alias "music_toggle" "music_off"; echo "Music enabled.""
alias "music_off" "snd_musicvolume 0.0; alias "music_toggle" "music_on"; echo "Music disabled.""
music_toggle
alias "voice_toggle" "voice_on" // !!
alias "voice_on" "exec cs2cfg/include/function/voice_on.cfg; alias "voice_toggle" "voice_off"; echo "Voice enabled.""
alias "voice_off" "exec cs2cfg/include/function/voice_off.cfg; alias "voice_toggle" "voice_on"; echo "Voice disabled.""
voice_toggle
alias "volume_toggle" "volume_on" // !!
alias "volume_on" "volume 1.0; exec cs2cfg/include/function/voice_on.cfg; alias "volume_toggle" "volume_off"; echo "Game sound enabled.""
alias "volume_off" "volume 0.0; exec cs2cfg/include/function/voice_off.cfg; alias "volume_toggle" "volume_on"; echo "Game sound disabled.""
volume_toggle

// Practice
alias "clear_util" "exec cs2cfg/include/function/clear_util"
alias "practice" "exec cs2cfg/include/function/practice"

play "sounds/player/playerping" // If you hear player ping on game start, that means that everything will be ok

echo "Loaded autoexec.cfg"
host_writeconfig
