// ================================
// Live crosshair settings
// ================================
// !!
alias "__internal_crosshair_util_toggle" "__internal_crosshair_util_off;"
alias "__internal_crosshair_util_on" "exec cs2cfg/include/internal/crosshair_util_on.cfg;alias "__internal_crosshair_util_toggle" "__internal_crosshair_util_off";"
alias "__internal_crosshair_util_off" "exec cs2cfg/include/internal/crosshair_util_off.cfg;alias "__internal_crosshair_util_toggle" "__internal_crosshair_util_on";"
__internal_crosshair_util_toggle
// !!
alias "crosshair_default" "exec cs2cfg/include/preset/crosshair/default.cfg;echo "Making your crosshair default, type `crosshair_big` to use the big crosshair.";"
alias "crosshair_big" "exec cs2cfg/include/preset/crosshair/big.cfg;echo "Making your crosshair big, type `crosshair_default` to use the default crosshair.";"
crosshair_default
// !!
alias "crosshair_recoil_toggle" "crosshair_recoil_on;"
alias "crosshair_recoil_on" "exec cs2cfg/include/toggle/crosshair/recoil/on.cfg;alias "crosshair_recoil_toggle" "crosshair_recoil_off";echo "Crosshair recoil following enabled.";"
alias "crosshair_recoil_off" "exec cs2cfg/include/toggle/crosshair/recoil/off.cfg;alias "crosshair_recoil_toggle" "crosshair_recoil_on";echo "Crosshair recoil following disabled.";"
crosshair_recoil_toggle

// ================================
// Show the game's netgraph (when tabbing)
// ================================
alias "telemetry_full" "exec cs2cfg/include/preset/telemetry/full.cfg;"
// !!
alias "telemetry_clean" "exec cs2cfg/include/preset/telemetry/clean.cfg;"
telemetry_clean
alias "+showscores_netgraph" "+showscores;telemetry_full;"
alias "-showscores_netgraph" "-showscores;telemetry_clean;"

// ================================
// Sound
// ================================
// !!
alias "music_toggle" "music_on;"
alias "music_on" "snd_musicvolume 1.0;alias "music_toggle" "music_off";echo "Music enabled.";"
alias "music_off" "snd_musicvolume 0.0;alias "music_toggle" "music_on";echo "Music disabled.";"
music_toggle
// !!
alias "voice_toggle" "voice_offq;"
alias "voice_on" "exec cs2cfg/include/toggle/voice/on.cfg;alias "voice_toggle" "voice_off";echo "Voice enabled.";"
alias "voice_offq" "exec cs2cfg/include/toggle/voice/off.cfg;alias "voice_toggle" "voice_on";echo "Voice disabled.";"
alias "voice_off" "needquiet;voice_offq;"
voice_toggle
// !!
alias "sound_toggle" "sound_on;"
alias "sound_on" "volume 1.0;alias "volume_toggle" "volume_off";echo "Game sound enabled.";"
alias "sound_off" "volume 0.0;exec cs2cfg/include/toggle/voice/off.cfg;alias "volume_toggle" "volume_on";echo "Game sound disabled.";"
sound_toggle

