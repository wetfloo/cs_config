// NOTICE: Any alias commented with `// !!`
// needs to be executed on the spot
// to make toggles work correctly

// Enable dev console
con_enable 1
developer 0

log_flags "InputService" "+donotecho"

exec cs2cfg/include/100_input/main.cfg
exec cs2cfg/include/200_hud/main.cfg
exec cs2cfg/include/300_sound/main.cfg
exec cs2cfg/include/400_misc/main.cfg

// ================================
// Convenience commands
// ================================
alias "reexec" "exec cs2cfg/autoexec.cfg;"
alias "exit" "quit;"
alias "disc" "reexec;disconnect;"
alias "quicklook" "+lookatweapon;-lookatweapon;"
alias "timeout" "callvote StartTimeout;"
alias "dm" "buy m4a1;buy ak47;buy deagle;buy taser;"

