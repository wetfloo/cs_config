echo "Loading alias module..."

// Convenience commands
alias "reexec" "exec cs2cfg/autoexec"
alias "exit" "quit"
alias "disc" "reexec; disconnect"

// Desubtick
alias "desub_off" "exec cs2cfg/include/function/desub_off"
alias "desub_on" "exec cs2cfg/include/function/desub_on"

// Inventory
alias "wpn_primary" "switchhandsleft; slot1"
alias "wpn_secondary" "switchhandsleft; slot2"
alias "wpn_melee" "switchhandsright; slot3"
alias "wpn_grenades" "slot4"
alias "wpn_bomb" "slot5"
alias "wpn_decoy" "buy decoy; slot9"
alias "wpn_smoke" "buy smokegrenade; slot8"
alias "wpn_flash" "buy flashbang; buy flashbang; slot7"
alias "wpn_molotov" "buy molotov; buy incgrenade; slot10"
alias "wpn_he" "buy hegrenade; slot6"
alias "wpn_health" "slot12"
alias "wpn_taser" "buy taser; switchhandsright; slot11"
alias "+dropbomb" "switchhandsright; wpn_melee; wpn_bomb"
alias "-dropbomb" "drop; say_team "I dropped the bomb."; wpn_melee"

// Toggle util crosshair when a grenade is being held
alias "+attack_" "+attack; crosshair_util_off; spec_next"
alias "-attack_" "-attack; crosshair_util_off; bind "q" toggleradarscale"
alias "+attack2_" "+attack2; crosshair_util_off; spec_prev"
alias "-attack2_" "-attack2; crosshair_util_off; bind "q" toggleradarscale"

// Show the CS2's netgraph when tabbing
alias "telemetry_full" "exec cs2cfg/include/function/telemetry_full"
alias "telemetry_clean" "exec cs2cfg/include/function/telemetry_clean"
alias "+showscores_netgraph" "+showscores; ex_telemetry_full"
alias "-showscores_netgraph" "-showscores; ex_telemetry_clean"

// Live crosshair settings
alias "crosshair_recoil_on" "exec cs2cfg/include/function/crosshair_recoil_on; alias "crosshair_recoil_toggle" "crosshair_recoil_off""
alias "crosshair_recoil_off" "exec cs2cfg/include/function/crosshair_recoil_off; alias "crosshair_recoil_toggle" "crosshair_recoil_on""
alias "crosshair_util_on" "exec cs2cfg/include/function/crosshair_util_on; bind "q" "exec cs2cfg/include/function/crosshair_util_off""
alias "crosshair_util_off" "exec cs2cfg/include/function/crosshair_util_off; bind "q" "exec cs2cfg/include/function/crosshair_util_on""

// Sound
alias "music_toggle" "music_on" // Execute this alias to make sure it'll work corrrectly!
alias "music_on" "snd_musicvolume 1.0; alias "music_toggle" "music_off""
alias "music_off" "snd_musicvolume 0.0; alias "music_toggle" "music_on""
alias "voice_toggle" "voice_on" // Execute this alias to make sure it'll work corrrectly!
alias "voice_on" "exec cs2cfg/include/function/voice_on.cfg; alias "voice_toggle" "voice_off""
alias "voice_off" "exec cs2cfg/include/function/voice_off.cfg; alias "voice_toggle" "voice_on""
alias "volume_toggle" "volume_on" // Execute this alias to make sure it'll work corrrectly!
alias "volume_on" "volume 1.0; exec cs2cfg/include/function/voice_on.cfg; alias "volume_toggle" "volume_off""
alias "volume_off" "volume 0.0; exec cs2cfg/include/function/voice_off.cfg; alias "volume_toggle" "volume_on""

// Practice
alias "clear_util" "exec cs2cfg/include/function/clear_util"
alias "practice" "exec cs2cfg/include/function/practice"

echo "Alias module loaded!"
