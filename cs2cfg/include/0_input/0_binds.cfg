echo ":: Loading keybinds..."

unbindall

// Local utility practice
bind "\" "exec cs2cfg/include/function/clear_utility"
bind "p" "noclip"
bind "END" "exec cs2cfg/include/function/practice_local"

// Inventory aliases
alias "wpn_primary" "switchhandsleft; slot1"
alias "wpn_secondary" "switchhandsleft; slot2"
alias "wpn_melee" "switchhandsright; slot3"
alias "wpn_grenades" "slot4"
alias "wpn_bomb" "slot5"
alias "wpn_decoy" "buy decoy; slot9"
alias "wpn_smoke" "buy smokegrenade; slot8"
alias "wpn_flash" "buy flashbang; buy flashbang; slot7"
alias "wpn_molotov" "buy molotov; buy incgrenade; slot10"
alias "wpn_he" "buy hegrenade; slot6"
alias "wpn_health" "slot12"
alias "wpn_taser" "buy taser; switchhandsright; slot11"
alias "+dropbomb" "switchhandsright; wpn_melee; wpn_bomb"
alias "-dropbomb" "drop; say_team "I dropped the bomb."; wpn_melee"

// Inventory inputs
bind "1" "wpn_secondary; wpn_primary; spec_player 1"
bind "2" "wpn_primary; wpn_secondary; spec_player 2"
bind "3" "spec_player 3"
bind "4" "wpn_melee; spec_player 4"
bind "5" "wpn_grenades; spec_player 5"
bind "6" "wpn_bomb; spec_player 6"
bind "7" "spec_player 7"
bind "8" "spec_player 8"
bind "9" "spec_player 9"
bind "0" "buy decoy; wpn_decoy; spec_player 10"
bind "z" "buy smokegrenade; wpn_smoke"
bind "x" "buy flashbang; buy flashbang; wpn_flash"
bind "MOUSE4" "buy molotov; buy incgrenade; wpn_molotov"
bind "MOUSE5" "buy hegrenade; wpn_he"
bind "w" "wpn_health"
bind "y" "buy taser; wpn_taser"
bind "j" "+dropbomb"

// Special alias to toggle util crosshair
alias "+attack_turbo" "+attack; exec cs2cfg/include/function/crosshair_util_disable; spec_next"
alias "-attack_turbo" "-attack; exec cs2cfg/include/function/crosshair_util_disable; bind "q" toggleradarscale"
alias "+attack2_turbo" "+attack2; exec cs2cfg/include/function/crosshair_util_disable; spec_prev"
alias "-attack2_turbo" "-attack2; exec cs2cfg/include/function/crosshair_util_disable; bind "q" toggleradarscale"

// Run, think, shoot, live
bind "e" "+forward_"
bind "s" "+left_"
bind "d" "+back_"
bind "f" "+right_"
bind "r" "+use"
bind "t" "+reload"
bind "a" "+lookatweapon"
bind "h" "drop"
bind "SHIFT" "+sprint_"
bind "SPACE" "+jump_"
bind "MWHEELUP" "+jump_"
bind "CTRL" "+duck_"
bind "MOUSE1" "+attack_turbo"
bind "MOUSE2" "+attack2_turbo"

// Buy & sell
bind "b" "buymenu"
cl_buywheel_donate_key 1 // Alt to drop weapons
bind "DEL" "sellbackall"
bind "F3" "autobuy"
bind "F4" "rebuy"

// Set autobuy
cl_autobuy "vesthelm vest m4a1 ak47 famas galilar mp9 mac10 smokegrenade flashbang defuser hegrenade molotov incgrenade flashbang"

// Quick buy binds
bind "KP_1" "buy m4a1; buy ak47"
bind "KP_2" "buy deagle"
bind "KP_3" "buy fiveseven; buy tec9"
bind "KP_4" "buy mp9; buy mac10"
bind "KP_5" "buy famas; buy galilar"
bind "KP_6" "buy awp"
bind "KP_0" "buy defuser"
bind "KP_9" "buy vesthelm; buy vest"
bind "KP_8" "buy vest"
bind "KP_MINUS" "buy smokegrenade; buy flashbang"
bind "KP_PLUS" "buy smokegrenade; buy hegrenade; buy molotov; buy incgrenade; buy flashbang; buy flashbang" // Numpad +


// UI
bind "ESCAPE" "cancelselect"

// Scoreboard
alias "+showscores_netgraph" "+showscores; exec cs2cfg/include/function/telemetry_full"
alias "-showscores_netgraph" "-showscores; exec cs2cfg/include/function/telemetry_clean"
bind "TAB" "+showscores_netgraph"
cl_scoreboard_mouse_enable_binding "+attack2_turbo"

// Comms
bind "v" "voice_modenable_toggle"
bind "c" "+voicerecord"
bind "ENTER" "messagemode2" // Team chat
bind "'" "messagemode" // Global chat
bind "MOUSE3" "demo_togglepause; player_ping"

// Misc
bind "F5" "toggleconsole"

echo ":: Keybinds loaded!"
