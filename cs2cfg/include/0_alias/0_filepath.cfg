echo ":: Loading filepath quick-exec settings..."

alias "reexec" "exec cs2cfg/autoexec"

// Keep the lines below at the top to make sure
// that the movement gets desubticked (or subticked, if disabled) correctly
alias "ex_desub_off" "exec cs2cfg/include/function/desub_off"
alias "ex_desub_on" "exec cs2cfg/include/function/desub_on"

alias "ex_crosshair_util_off" "exec cs2cfg/include/function/crosshair_util_off"
alias "ex_crosshair_util_on" "exec cs2cfg/include/function/crosshair_util_on"
alias "ex_crosshair_recoil_off" "exec cs2cfg/include/function/crosshair_recoil_off"
alias "ex_crosshair_recoil_on" "exec cs2cfg/include/function/crosshair_recoil_on"

alias "ex_telemetry_clean" "exec cs2cfg/include/function/telemetry_clean"
alias "ex_telemetry_full" "exec cs2cfg/include/function/telemetry_full"

alias "ex_clear_util" "exec cs2cfg/include/function/clear_util"
alias "ex_practice" "exec cs2cfg/include/function/practice"

echo ":: Filepath quick-exec settings loaded!"
