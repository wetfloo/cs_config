echo "Loading alias module..."

exec cs2cfg/include/0_alias/0_filepath

// Convenience commands
alias "exit" "quit"
alias "disc" "reexec; disconnect"

// Desubtick
alias "desub_off" "ex_desub_off"
alias "desub_on" "ex_desub_on"

// Inventory
alias "wpn_primary" "switchhandsleft; slot1"
alias "wpn_secondary" "switchhandsleft; slot2"
alias "wpn_melee" "switchhandsright; slot3"
alias "wpn_grenades" "slot4"
alias "wpn_bomb" "slot5"
alias "wpn_decoy" "buy decoy; slot9"
alias "wpn_smoke" "buy smokegrenade; slot8"
alias "wpn_flash" "buy flashbang; buy flashbang; slot7"
alias "wpn_molotov" "buy molotov; buy incgrenade; slot10"
alias "wpn_he" "buy hegrenade; slot6"
alias "wpn_health" "slot12"
alias "wpn_taser" "buy taser; switchhandsright; slot11"
alias "+dropbomb" "switchhandsright; wpn_melee; wpn_bomb"
alias "-dropbomb" "drop; say_team "I dropped the bomb."; wpn_melee"

// Toggle util crosshair when a grenade is being held
alias "+attack_" "+attack; crosshair_util_off; spec_next"
alias "-attack_" "-attack; crosshair_util_off; bind "q" toggleradarscale"
alias "+attack2_" "+attack2; crosshair_util_off; spec_prev"
alias "-attack2_" "-attack2; crosshair_util_off; bind "q" toggleradarscale"

// Show the CS2's netgraph when tabbing
alias "telemetry_full" "ex_telemetry_full"
alias "telemetry_clean" "ex_telemetry_clean"
alias "+showscores_netgraph" "+showscores; ex_telemetry_full"
alias "-showscores_netgraph" "-showscores; ex_telemetry_clean"

// Live crosshair settings
alias "crosshair_recoil_on" "ex_crosshair_recoil_on; alias "crosshair_recoil_toggle" "crosshair_recoil_off""
alias "crosshair_recoil_off" "ex_crosshair_recoil_off; alias "crosshair_recoil_toggle" "crosshair_recoil_on""
alias "crosshair_util_on" "ex_crosshair_util_on; bind "q" "ex_crosshair_util_off""
alias "crosshair_util_off" "ex_crosshair_util_off; bind "q" "ex_crosshair_util_on""

// Volume
alias "music_toggle" "toggle snd_musicvolume 1.0 0.0"
alias "music_on" "snd_musicvolume 1.0"
alias "music_off" "snd_musicvolume 0.0"

// Practice
alias "clear_util" "ex_clear_util"
alias "practice" "ex_practice"

echo "Alias module loaded!"
