echo ":: Loading keybinds..."

// This now uses scancodes to bind keys,
// comments starting with "//#" show what key on a
// standard ANSI keyboard it is.
//
// Scancodes seem to map 1-to-1 to SDL2's scancodes,
// so you can see the full table of them here:
// https://wiki.libsdl.org/SDL2/SDLScancodeLookup

// Local utility practice
bind "scancode49" "clear_util"                                                                                 //# \ (SDL_SCANCODE_BACKSLASH)
bind "scancode19" "noclip"                                                                                     //# p (SDL_SCANCODE_P)

// Inventory inputs
bind "scancode30" "wpn_secondary; wpn_primary; spec_player 1"                                                  //# 1 (SDL_SCANCODE_1)
bind "scancode31" "wpn_primary; wpn_secondary; spec_player 2"                                                  //# 2 (SDL_SCANCODE_2)
bind "scancode32" "spec_player 3"                                                                              //# 3 (SDL_SCANCODE_3)
bind "scancode33" "wpn_melee; spec_player 4"                                                                   //# 4 (SDL_SCANCODE_4)
bind "scancode34" "wpn_grenades; spec_player 5"                                                                //# 5 (SDL_SCANCODE_5)
bind "scancode35" "wpn_bomb; spec_player 6"                                                                    //# 6 (SDL_SCANCODE_6)
bind "scancode36" "spec_player 7"                                                                              //# 7 (SDL_SCANCODE_7)
bind "scancode37" "spec_player 8"                                                                              //# 8 (SDL_SCANCODE_8)
bind "scancode38" "spec_player 9"                                                                              //# 9 (SDL_SCANCODE_9)
bind "scancode39" "buy decoy; wpn_decoy; spec_player 10"                                                       //# 0 (SDL_SCANCODE_0)
bind "scancode29" "buy smokegrenade; wpn_smoke"                                                                //# z (SDL_SCANCODE_Z)
bind "scancode27" "buy flashbang; buy flashbang; wpn_flash"                                                    //# x (SDL_SCANCODE_X)
bind "MOUSE4" "buy molotov; buy incgrenade; wpn_molotov"
bind "MOUSE5" "buy hegrenade; wpn_he"
bind "scancode26" "wpn_health"                                                                                 //# w (SDL_SCANCODE_W)
bind "scancode28" "buy taser; wpn_taser"                                                                       //# y (SDL_SCANCODE_Y)
bind "scancode13" "+dropbomb"                                                                                  //# j (SDL_SCANCODE_J)

// Run, think, shoot, live
bind "scancode8" "+forward_"                                                                                   //# e (SDL_SCANCODE_E)
bind "scancode22" "+left_"                                                                                     //# s (SDL_SCANCODE_S)
bind "scancode7" "+back_"                                                                                      //# d (SDL_SCANCODE_D)
bind "scancode9" "+right_"                                                                                     //# f (SDL_SCANCODE_F)
bind "scancode21" "+use"                                                                                       //# r (SDL_SCANCODE_R)
bind "scancode23" "+reload"                                                                                    //# t (SDL_SCANCODE_T)
bind "scancode4" "+lookatweapon"                                                                               //# a (SDL_SCANCODE_A)
bind "scancode11" "drop"                                                                                       //# h (SDL_SCANCODE_H)
bind "scancode225" "+sprint_"                                                                                  //# Left Shift (SDL_SCANCODE_LSHIFT)
bind "scancode44" "+jump_"                                                                                     //# Space (SDL_SCANCODE_SPACE)
bind "MWHEELUP" "+jump_"
bind "scancode224" "+duck_"                                                                                    //# Left Control (SDL_SCANCODE_LCTRL)
bind "MOUSE1" "+attack_"
bind "MOUSE2" "+attack2_"

// Buy & sell
bind "scancode5" "buymenu"                                                                                     //# b (SDL_SCANCODE_B)
bind "scancode76" "sellbackall"                                                                                //# Delete (SDL_SCANCODE_DELETE)
bind "scancode60" "autobuy"                                                                                    //# F3 (SDL_SCANCODE_F3)
bind "scancode61" "rebuy"                                                                                      //# F4 (SDL_SCANCODE_F4)
cl_buywheel_donate_key 1 // Alt to drop weapons

// Quick buy binds
bind "scancode89" "buy m4a1; buy ak47"                                                                         //# Keypad 1 (SDL_SCANCODE_KP_1)
bind "scancode90" "buy famas; buy galilar"                                                                     //# Keypad 2 (SDL_SCANCODE_KP_2)
bind "scancode91" "buy mp9; buy mac10"                                                                         //# Keypad 3 (SDL_SCANCODE_KP_3)
bind "scancode97" "buy smokegrenade; buy hegrenade; buy molotov; buy incgrenade; buy flashbang; buy flashbang" //# Keypad 9 (SDL_SCANCODE_KP_9)
bind "scancode98" "buy defuser"                                                                                //# Keypad 0 (SDL_SCANCODE_KP_0)
bind "scancode86" "buy vest"                                                                                   //# Keypad - (SDL_SCANCODE_KP_MINUS)
bind "scancode87" "buy vesthelm; buy vest"                                                                     //# Keypad + (SDL_SCANCODE_KP_PLUS)

// UI
bind "scancode41" "cancelselect"                                                                               //# Escape (SDL_SCANCODE_ESCAPE)
bind "scancode20" "qcmd"                                                                                       //# q (SDL_SCANCODE_Q)
bind "scancode226" "crosshair_recoil_toggle"                                                                   //# Left Alt (SDL_SCANCODE_LALT)

// Scoreboard
bind "scancode43" "+showscores_netgraph"                                                                       //# TAB (SDL_SCANCODE_TAB)
cl_scoreboard_mouse_enable_binding "+attack2_"

// Comms
bind "scancode25" "voice_toggle"                                                                               //# v (SDL_SCANCODE_V)
bind "scancode6" "+voicerec"                                                                                   //# c (SDL_SCANCODE_C)
bind "scancode40" "chat_team"                                                                                  //# Enter (SDL_SCANCODE_RETURN)
bind "scancode52" "chat_all"                                                                                   //# ' (SDL_SCANCODE_APOSTROPHE)
bind "MOUSE3" "demo_togglepause; player_ping"

// Misc
bind "scancode62" "toggleconsole"                                                                              //# F5 (SDL_SCANCODE_F5)

echo ":: Keybinds loaded!"
