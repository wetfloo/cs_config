echo ":: Loading keybinds..."

// This now uses scancodes to bind keys,
// comments starting with "//#" show what key on a
// standard ANSI keyboard it is.
//
// Scancodes seem to map 1-to-1 to SDL2's scancodes,
// so you can see the full table of them here:
// https://wiki.libsdl.org/SDL2/SDLScancodeLookup

// ================================
// Local utility practice
// ================================
bind "scancode49" "+action_key_scancode49"               //# \ (SDL_SCANCODE_BACKSLASH)
bind "scancode19" "+action_key_scancode19"               //# p (SDL_SCANCODE_P)

// ================================
// Inventory inputs
// ================================
bind "scancode30" "+action_key_scancode30"               //# 1 (SDL_SCANCODE_1)
bind "scancode31" "+action_key_scancode31"               //# 2 (SDL_SCANCODE_2)
bind "scancode32" "+action_key_scancode32"               //# 3 (SDL_SCANCODE_3)
bind "scancode33" "+action_key_scancode33"               //# 4 (SDL_SCANCODE_4)
bind "scancode34" "+action_key_scancode34"               //# 5 (SDL_SCANCODE_5)
bind "scancode35" "+action_key_scancode35"               //# 6 (SDL_SCANCODE_6)
bind "scancode36" "+action_key_scancode36"               //# 7 (SDL_SCANCODE_7)
bind "scancode37" "+action_key_scancode37"               //# 8 (SDL_SCANCODE_8)
bind "scancode38" "+action_key_scancode38"               //# 9 (SDL_SCANCODE_9)
bind "scancode39" "+action_key_scancode39"               //# 0 (SDL_SCANCODE_0)
bind "scancode29" "+action_key_scancode29"               //# z (SDL_SCANCODE_Z)
bind "scancode27" "+action_key_scancode27"               //# x (SDL_SCANCODE_X)
bind "MOUSE4" "+action_key_mouse4"
bind "MOUSE5" "+action_key_mouse5"
bind "scancode26" "+action_key_scancode26"               //# w (SDL_SCANCODE_W)
bind "scancode28" "+action_key_scancode28"               //# y (SDL_SCANCODE_Y)
bind "scancode13" "+action_key_scancode13"               //# j (SDL_SCANCODE_J)

// ================================
// Run, think, shoot, live
// ================================
bind "scancode8" "+action_key_scancode8"                 //# e (SDL_SCANCODE_E)
bind "scancode22" "+action_key_scancode22"               //# s (SDL_SCANCODE_S)
bind "scancode7" "+action_key_scancode7"                 //# d (SDL_SCANCODE_D)
bind "scancode9" "+action_key_scancode9"                 //# f (SDL_SCANCODE_F)
bind "scancode21" "+action_key_scancode21"               //# r (SDL_SCANCODE_R)
// Direct bind, to try to get rid of respawn
// reload on certain DM servers
bind "scancode23" "+reload"                              //# t (SDL_SCANCODE_T)
// Direct bind, because if we don't do this,
// we won't be able to inspect player loadouts
bind "scancode4" "+lookatweapon"                         //# a (SDL_SCANCODE_A)
bind "scancode11" "+action_key_scancode11"               //# h (SDL_SCANCODE_H)
bind "scancode225" "+action_key_scancode225"             //# Left Shift (SDL_SCANCODE_LSHIFT)
bind "scancode44" "+action_key_scancode44"               //# Space (SDL_SCANCODE_SPACE)
bind "MWHEELUP" "+action_key_mwheelup"
bind "scancode224" "+action_key_scancode224"             //# Left Control (SDL_SCANCODE_LCTRL)
bind "MOUSE1" "+action_key_mouse1"
bind "MOUSE2" "+action_key_mouse2"
bind "scancode17" "+action_key_scancode17"               //# n (SDL_SCANCODE_N)

// ================================
// Buy & sell
// ================================
bind "scancode5" "+action_key_scancode5"                 //# b (SDL_SCANCODE_B)
bind "scancode76" "+action_key_scancode76"               //# Delete (SDL_SCANCODE_DELETE)
bind "scancode60" "+action_key_scancode60"               //# F3 (SDL_SCANCODE_F3)
bind "scancode61" "+action_key_scancode61"               //# F4 (SDL_SCANCODE_F4)
// Alt to drop weapons
cl_buywheel_donate_key 1

// ================================
// Quick buy binds
// ================================
bind "scancode89" "+action_key_scancode89"               //# Keypad 1 (SDL_SCANCODE_KP_1)
bind "scancode90" "+action_key_scancode90"               //# Keypad 2 (SDL_SCANCODE_KP_2)
bind "scancode91" "+action_key_scancode91"               //# Keypad 3 (SDL_SCANCODE_KP_3)
bind "scancode97" "+action_key_scancode97"               //# Keypad 9 (SDL_SCANCODE_KP_9)
bind "scancode98" "+action_key_scancode98"               //# Keypad 0 (SDL_SCANCODE_KP_0)
bind "scancode86" "+action_key_scancode86"               //# Keypad - (SDL_SCANCODE_KP_MINUS)
bind "scancode87" "+action_key_scancode87"               //# Keypad + (SDL_SCANCODE_KP_PLUS)

// ================================
// UI
// ================================
bind "scancode41" "+action_key_scancode41"               //# Escape (SDL_SCANCODE_ESCAPE)
bind "scancode20" "+action_key_scancode20"               //# q (SDL_SCANCODE_Q)
bind "scancode226" "+action_key_scancode226"             //# Left Alt (SDL_SCANCODE_LALT)

// ================================
// Scoreboard
// ================================
bind "scancode43" "+action_key_scancode43"               //# TAB (SDL_SCANCODE_TAB)
cl_scoreboard_mouse_enable_binding "+action_key_mouse2"

// ================================
// Comms
// ================================
bind "scancode25" "+action_key_scancode25"               //# v (SDL_SCANCODE_V)
bind "scancode6" "+action_key_scancode6"                 //# c (SDL_SCANCODE_C)
bind "MOUSE3" "+action_key_mouse3"
// Direct binds, because messaging otherwise
// these commands don't do anything, for some reason
//
// Team chat
bind "scancode40" "messagemode2"                         //# Enter (SDL_SCANCODE_RETURN)
// Global chat
bind "scancode52" "messagemode"                          //# ' (SDL_SCANCODE_APOSTROPHE)

// ================================
// Misc
// ================================
bind "scancode62" "toggleconsole"                        //# F5 (SDL_SCANCODE_F5)

echo ":: Keybinds loaded!"
