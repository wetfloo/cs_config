echo ":: Loading keybinds..."

// This now uses scancodes to bind keys,
// comments starting with "//#" show what key on a
// standard ANSI keyboard it is.
//
// Scancodes seem to map 1-to-1 to SDL2's scancodes,
// so you can see the full table of them here:
// https://wiki.libsdl.org/SDL2/SDLScancodeLookup

// Local utility practice
bind "scancode49" "+action_key_49"                          //# \ (SDL_SCANCODE_BACKSLASH)
bind "scancode19" "+action_key_19"                          //# p (SDL_SCANCODE_P)

// Inventory inputs
bind "scancode30" "+action_key_30"                          //# 1 (SDL_SCANCODE_1)
bind "scancode31" "+action_key_31"                          //# 2 (SDL_SCANCODE_2)
bind "scancode32" "+action_key_32"                          //# 3 (SDL_SCANCODE_3)
bind "scancode33" "+action_key_33"                          //# 4 (SDL_SCANCODE_4)
bind "scancode34" "+action_key_34"                          //# 5 (SDL_SCANCODE_5)
bind "scancode35" "+action_key_35"                          //# 6 (SDL_SCANCODE_6)
bind "scancode36" "+action_key_36"                          //# 7 (SDL_SCANCODE_7)
bind "scancode37" "+action_key_37"                          //# 8 (SDL_SCANCODE_8)
bind "scancode38" "+action_key_38"                          //# 9 (SDL_SCANCODE_9)
bind "scancode39" "+action_key_39"                          //# 0 (SDL_SCANCODE_0)
bind "scancode29" "+action_key_29"                          //# z (SDL_SCANCODE_Z)
bind "scancode27" "+action_key_27"                          //# x (SDL_SCANCODE_X)
bind "MOUSE4" "+action_key_mouse4"
bind "MOUSE5" "+action_key_mouse5"
bind "scancode26" "+action_key_26"                          //# w (SDL_SCANCODE_W)
bind "scancode28" "+action_key_28"                          //# y (SDL_SCANCODE_Y)
bind "scancode13" "+action_key_13"                          //# j (SDL_SCANCODE_J)

// Run, think, shoot, live
bind "scancode8" "+action_key_8"                            //# e (SDL_SCANCODE_E)
bind "scancode22" "+action_key_22"                          //# s (SDL_SCANCODE_S)
bind "scancode7" "+action_key_7"                            //# d (SDL_SCANCODE_D)
bind "scancode9" "+action_key_9"                            //# f (SDL_SCANCODE_F)
bind "scancode21" "+action_key_21"                          //# r (SDL_SCANCODE_R)
bind "scancode23" "+reload"                                 //# t (SDL_SCANCODE_T)
bind "scancode4" "+lookatweapon"                            //# a (SDL_SCANCODE_A)
bind "scancode11" "+action_key_11"                          //# h (SDL_SCANCODE_H)
bind "scancode225" "+action_key_225"                        //# Left Shift (SDL_SCANCODE_LSHIFT)
bind "scancode44" "+action_key_44"                          //# Space (SDL_SCANCODE_SPACE)
bind "MWHEELUP" "+action_key_mwheelup"
bind "scancode224" "+action_key_224"                        //# Left Control (SDL_SCANCODE_LCTRL)
bind "MOUSE1" "+action_key_mouse1"
bind "MOUSE2" "+action_key_mouse2"

// Buy & sell
bind "scancode5" "+action_key_5"                            //# b (SDL_SCANCODE_B)
bind "scancode76" "+action_key_76"                          //# Delete (SDL_SCANCODE_DELETE)
bind "scancode60" "+action_key_60"                          //# F3 (SDL_SCANCODE_F3)
bind "scancode61" "+action_key_61"                          //# F4 (SDL_SCANCODE_F4)
cl_buywheel_donate_key 1            // Alt to drop weapons

// Quick buy binds
bind "scancode89" "+action_key_89"                          //# Keypad 1 (SDL_SCANCODE_KP_1)
bind "scancode90" "+action_key_90"                          //# Keypad 2 (SDL_SCANCODE_KP_2)
bind "scancode91" "+action_key_91"                          //# Keypad 3 (SDL_SCANCODE_KP_3)
bind "scancode97" "+action_key_97"                          //# Keypad 9 (SDL_SCANCODE_KP_9)
bind "scancode98" "+action_key_98"                          //# Keypad 0 (SDL_SCANCODE_KP_0)
bind "scancode86" "+action_key_86"                          //# Keypad - (SDL_SCANCODE_KP_MINUS)
bind "scancode87" "+action_key_87"                          //# Keypad + (SDL_SCANCODE_KP_PLUS)

// UI
bind "scancode41" "+action_key_41"                          //# Escape (SDL_SCANCODE_ESCAPE)
bind "scancode20" "+action_key_20"                          //# q (SDL_SCANCODE_Q)
bind "scancode226" "+action_key_226"                        //# Left Alt (SDL_SCANCODE_LALT)

// Scoreboard
bind "scancode43" "+action_key_43"                          //# TAB (SDL_SCANCODE_TAB)
cl_scoreboard_mouse_enable_binding "+action_key_mouse2"

// Comms
bind "scancode25" "+action_key_25"                          //# v (SDL_SCANCODE_V)
bind "scancode6" "+action_key_6"                            //# c (SDL_SCANCODE_C)
bind "scancode40" "messagemode2" // Team chat               //# Enter (SDL_SCANCODE_RETURN)
bind "scancode52" "messagemode" // Global chat              //# ' (SDL_SCANCODE_APOSTROPHE)
bind "MOUSE3" "+action_key_mouse3"

// Misc
bind "scancode62" "toggleconsole"                           //# F5 (SDL_SCANCODE_F5)

echo ":: Keybinds loaded!"
