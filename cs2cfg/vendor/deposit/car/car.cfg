ent_create point_script {"cs_script" "cfg/cs2cfg/vendor/deposit/car.vjs"}

ent_create prop_dynamic {"model" "models/props/de_dust/hr_dust/dust_vehicles/dust_taxi_interior.vmdl" "targetname" "car_inter_prefab"};
ent_create prop_dynamic {"model" "models/props/de_dust/hr_dust/dust_vehicles/dust_taxi_body.vmdl" "targetname" "car_model_prefab"};
ent_create prop_dynamic {"model" "models/props/de_dust/hr_dust/dust_vehicles/dust_taxi_glass_opaque.vmdl" "targetname" "car_glass_prefab"};
ent_create prop_dynamic {"model" "models/vehicles/large_truck_01/large_truck_cabin_wheel_01.vmdl" "targetname" "car_wheel_left_up"};
ent_create prop_dynamic {"model" "models/vehicles/large_truck_01/large_truck_cabin_wheel_01.vmdl" "targetname" "car_wheel_right_up"};
ent_create prop_dynamic {"model" "models/vehicles/large_truck_01/large_truck_cabin_wheel_01.vmdl" "targetname" "car_wheel_left_down"};
ent_create prop_dynamic {"model" "models/vehicles/large_truck_01/large_truck_cabin_wheel_01.vmdl" "targetname" "car_wheel_right_down"};

ent_fire point_script RunScriptInput car_spawn 1

alias toggledrive "firstperson;alias person untoggdrive;ent_fire point_script RunScriptInput car_drive_firstperson_toggle";
alias untoggdrive "thirdperson;alias person toggledrive;ent_fire point_script RunScriptInput car_drive_firstperson_toggle";
alias person "toggledrive"
alias car_toggle_fp_camera person
alias car_toggle_fly "ent_fire point_script RunScriptInput toggle"
alias car_toggle_fall "ent_fire point_script RunScriptInput nofall"
alias cc_enter "ent_fire !player setscale 0;ent_fire point_script RunScriptInput car_enter;thirdperson"
alias cc_exit "ent_fire point_script RunScriptInput car_exit;ent_fire !player setscale 1;firstperson"
alias car_enter "ent_fire !player setscale 0;ent_fire point_script RunScriptInput car_enter;thirdperson"
alias car_exit "ent_fire point_script RunScriptInput car_exit;ent_fire !player setscale 1;firstperson"

setinfo  car_enter ""
setinfo  car_exit ""
setinfo car_toggle_fly ""
setinfo car_toggle_fall ""
setinfo car_toggle_fp_camera ""
