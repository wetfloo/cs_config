sv_cheats 1
ent_create point_script {"cs_script" "cfg/cs2cfg/vendor/deposit/blocks.vjs" "targetname" "brick_mechanic"}
alias gamemode_creative "ent_fire point_script runscriptinput gamemode_creative"
alias gamemode_survival "ent_fire point_script runscriptinput gamemode_survival"
alias gamemode_adventure "ent_fire point_script runscriptinput gamemode_adventure"
alias block_save "clear;ent_fire brick_mechanic RunScriptInput building_save_dump"
alias clear_all "ent_fire point_script runscriptinput mc_clear"
setinfo gamemode_creative ""
setinfo gamemode_survival ""
setinfo gamemode_adventure ""
setinfo block_save ""
setinfo clear_all ""
player_ping_token_cooldown 0
mp_taser_recharge_time 0
sleep 99
clear
sleep 99
echoln ========================================================================
echoln gamemode_creative - ЛКМ/ПКМ - Поставить/убрать блоки (с ножом в руках)
echoln gamemode_survival - Блоки ломаются только выстрелами (строить нельзя)
echoln gamemode_adventure - Полный запрет на строительство и разрушение блоков
echoln block_save - Вывести схему постройки в консоль (сохранять надо вручную)
echoln clear_all - Очищает всю карту от блоков
echoln !color1, !color2 - Написать в чат для смены цвета
echoln !color R G B - Использование уникального цвета (прим. !color 128 91 0)
echoln Выстрел из ZeusX27 копирует цвет блока, на который вы смотрите
echoln Нажатие на колесо мыши меняет цвет!
echoln ========================================================================
