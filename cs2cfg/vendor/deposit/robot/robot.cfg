sv_cheats 1
ent_create point_script {"cs_script" "cfg/cs2cfg/vendor/deposit/robot/robot.vjs" "targetname" "tronrobo_script"};
ent_fire tronrobo_script addoutput "OnUser1>tronrobo_script>RunScriptInput>robot_build>0.12>0" 1
ent_fire tronrobo_script addoutput "OnUser1>robot_*>color>40 120 200>0.08>0" 1

alias rbblck "ent_create prop_dynamic {"model" "models/generic/gas_meters_01/gk01_meter_02_lp.vmdl" "scale" "0" "targetname" "robot_body_prefab" };ent_create prop_dynamic {"model" "models/generic/retro_monitor_01/retro_monitor_01_front.vmdl" "scale" "0"  "targetname" "robot_face_prefab"};ent_create prop_dynamic {"model" "models/generic/gutter_kit_01/gk01_pipe_01_end_04_a.vmdl" "targetname" "robot_rh_prefab" "scale" "0"}"
alias rbblck2 "ent_create prop_dynamic {"model" "models/generic/gutter_kit_01/gk01_pipe_01_end_04_a.vmdl" "targetname" "robot_lh_prefab" "scale" "0"};ent_create prop_dynamic {"model" "models/generic/pallet_jack_01/pallet_jack_wheel_01.vmdl" "targetname" "robot_rf_prefab" "scale" "0"};ent_create prop_dynamic {"model" "models/generic/pallet_jack_01/pallet_jack_wheel_01.vmdl" "targetname" "robot_lf_prefab" "scale" "0"}"
alias rbblck3 "ent_create prop_dynamic {"model" "models/generic/missile_01/missile_01.vmdl" "targetname" "robot_rocket1_prefab" "scale" "0"};ent_create prop_dynamic {"model" "models/generic/missile_01/missile_01.vmdl" "targetname" "robot_rocket2_prefab" "scale" "0"}; ent_create info_target {"targetname" "robot_mega_super_point"}"
alias rbblck_props "rbblck;rbblck2;rbblck3"
alias friendly_mode_toggle "ent_fire tronrobo_script runscriptinput friendly_mode_toggle"
alias spawn_bot "rbblck_props;ent_fire tronrobo_script fireuser1;ent_fire robot_* kill:1"

setinfo spawn_bot ""
setinfo friendly_mode_toggle ""

sleep 99
clear
sleep 99

echoln ========================================================================
echoln spawn_bot - Заспавнить робота
echoln friendly_mode_toggle - ВКЛ/ВЫКЛ режим дружелюбных роботов (ВЫКЛ по умолчанию)
echoln ========================================================================
