echo "Loading alias module..."

alias "reexec" "exec l4d2cfg/autoexec.cfg"
alias "disc" "reexec; disconnect"
alias "none" ""
alias "nodsp" "dsp_volume 0"

// Easier to remember than random numbers in impulse command
alias "spraylogo" "impulse 201"
alias "toggleflashlight" "impulse 100"

// Voice setup to quickly mute those who are annoying
alias "voice_on" "exec l4d2cfg/include/function/voice_on.cfg; alias voice_toggle voice_off"
alias "voice_off" "exec l4d2cfg/include/function/voice_off.cfg; alias voice_toggle voice_on"
alias "voice_toggle" "voice_on"

// Special aliases to disable DSP
// (supposedly, allows you to more easily pinpoint where specials are)
alias "+forward_" "nodsp;+forward;alias checkfwd +forward"
alias "+back_" "nodsp;+back;alias checkback +back"
alias "+left_" "nodsp;+moveleft;alias checkleft +moveleft"
alias "+right_" "nodsp;+moveright;alias checkright +moveright"
alias "-forward_" "-forward;checkback;alias checkfwd none"
alias "-back_" "-back;checkfwd;alias checkback none"
alias "-left_" "-moveleft;checkright;alias checkleft none"
alias "-right_" "-moveright;checkleft;alias checkright none"
alias "checkfwd" "none"
alias "checkback" "none"
alias "checkleft" "none"
alias "checkright" "none"

// Other aliases for movement and disabling DSP at the same time
alias "+speed_" "nodsp;+speed"
alias "-speed_" "nodsp;-speed"
alias "+jump_" "nodsp;+jump"
alias "-jump_" "nodsp;-jump"
alias "+duck_" "nodsp;+duck"
alias "-duck_" "nodsp;-duck"
alias "+attack_" "nodsp;+attack"
alias "-attack_" "nodsp;-attack"
alias "+attack2_" "nodsp;+attack2"
alias "-attack2_" "nodsp;-attack2"
alias "+zoom_" "nodsp;+zoom"
alias "-zoom_" "nodsp;-zoom"

alias "telemetry_full" "exec l4d2cfg/include/function/telemetry_full.cfg"
alias "telemetry_clean" "exec l4d2cfg/include/function/telemetry_clean.cfg"
alias "+showscores_netgraph" "+showscores; telemetry_full"
alias "-showscores_netgraph" "-showscores; telemetry_clean"

alias "practice" "exec l4d2cfg/include/function/practice.cfg"

// Quickly use items
alias "+quickpilleat" "slot5; +attack_"
alias "-quickpilleat" "-attack_; lastinv"
alias "+quickheal" "slot4; +attack_"
alias "-quickheal" "-attack_; lastinv"
alias "+quickhealother" "slot4; +attack2_"
alias "-quickhealother" "-attack2_; lastinv"

// Shortcuts to change teams
alias "spec" "sm_s"
alias "sur" "jointeam 2"
alias "inf" "jointeam 3"

echo "Alias module loaded!"
