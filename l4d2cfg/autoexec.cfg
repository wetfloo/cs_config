// NOTICE: Any alias commented with `// !!`
// needs to be executed on the spot
// to make toggles work correctly

// Enable dev console
con_enable 1

exec l4d2cfg/include/100_input/main.cfg
exec l4d2cfg/include/200_hud/main.cfg
exec l4d2cfg/include/300_sound/main.cfg
exec l4d2cfg/include/350_video/main.cfg
exec l4d2cfg/include/400_misc/main.cfg

// ================================
// Convenience commands
// ================================
alias "reexec" "exec l4d2cfg/autoexec.cfg"

alias "practice" "exec l4d2cfg/include/function/practice.cfg"

alias "disc" "reexec; disconnect"
alias "none" ""
// Easier to remember than random numbers in impulse command
alias "spraylogo" "impulse 201"
alias "flashlight_toggle" "impulse 100"

// ================================
// Show the game's netgraph (when tabbing)
// ================================
alias "telemetry_full" "exec l4d2cfg/include/function/telemetry_full.cfg"
// !!
alias "telemetry_clean" "exec l4d2cfg/include/function/telemetry_clean.cfg"
telemetry_clean
alias "+showscores_netgraph" "+showscores; telemetry_full"
alias "-showscores_netgraph" "-showscores; telemetry_clean"

// ================================
// Sound
// ================================
// !!
alias "music_toggle" "music_on"
alias "music_on" "snd_musicvolume 0.5; alias "music_toggle" "music_off"; echo "Music enabled.""
alias "music_off" "snd_musicvolume 0.0; alias "music_toggle" "music_on"; echo "Music disabled.""
music_toggle
// !!
alias "voice_toggle" "voice_off"
alias "voice_on" "exec l4d2cfg/include/function/voice_on.cfg; alias voice_toggle voice_off; echo "Voice enabled."; play ui/beep_error01"
alias "voice_off" "exec l4d2cfg/include/function/voice_off.cfg; alias voice_toggle voice_on; echo "Voice disabled."; play ui/beepclear"
voice_toggle
// !!
alias "volume_toggle" "volume_on"
alias "volume_on" "volume 0.35; alias "volume_toggle" "volume_off"; echo "Game sound enabled.""
alias "volume_off" "volume 0.0; exec l4d2cfg/include/function/voice_off.cfg; alias "volume_toggle" "volume_on"; echo "Game sound disabled.""
volume_toggle

// ================================
// Special aliases to disable DSP
// (supposedly, allows you to more easily pinpoint where specials are)
// ================================
alias "dsp_off" "dsp_volume 0"
alias "+forward_" "dsp_off; +forward; alias checkfwd +forward"
alias "+back_" "dsp_off; +back; alias checkback +back"
alias "+left_" "dsp_off; +moveleft; alias checkleft +moveleft"
alias "+right_" "dsp_off; +moveright; alias checkright +moveright"
alias "-forward_" "-forward; checkback; alias checkfwd none"
alias "-back_" "-back; checkfwd; alias checkback none"
alias "-left_" "-moveleft; checkright; alias checkleft none"
alias "-right_" "-moveright; checkleft; alias checkright none"
alias "checkfwd" "none"
alias "checkback" "none"
alias "checkleft" "none"
alias "checkright" "none"

// ================================
// Other aliases for movement and disabling DSP at the same time
// ================================
alias "+speed_" "dsp_off; +speed"
alias "-speed_" "dsp_off; -speed"
alias "+jump_" "dsp_off; +jump"
alias "-jump_" "dsp_off; -jump"
alias "+duck_" "dsp_off; +duck"
alias "-duck_" "dsp_off; -duck"
alias "+attack_" "dsp_off; +attack"
alias "-attack_" "dsp_off; -attack"
alias "+attack2_" "dsp_off; +attack2"
alias "-attack2_" "dsp_off; -attack2"
alias "+zoom_" "dsp_off; +zoom"
alias "-zoom_" "dsp_off; -zoom"

// ================================
// Quickly use items
// ================================
alias "+quickpilleat" "slot5; +attack_"
alias "-quickpilleat" "-attack_; slot2; slot1"
alias "+quickheal" "slot4; +attack_"
alias "-quickheal" "-attack_; slot2; slot1"
alias "+quickhealother" "slot4; +attack2_"
alias "-quickhealother" "-attack2_; slot2; slot1"

// ================================
// Quickswitch for melee/shotguns
// ================================
alias "+quickswitch" "lastinv"
alias "-quickswitch" "lastinv"

// ================================
// Shortcuts to change teams
// ================================
alias "spec" "sm_s"
alias "sur" "jointeam 2"
alias "inf" "jointeam 3"

// ================================
// Lerps
// ================================
alias "lerp0" "cl_interp 0"
alias "lerp10" "cl_interp 0.01"
alias "lerp16" "cl_interp 0.0167"
alias "lerp33" "cl_interp 0.0333"
alias "lerp66" "cl_interp 0.0667"
alias "lerp100" "cl_interp 0.1"

// ================================
// Rates
// ================================
alias "rate100" "rate 100000; cl_cmdrate 100; cl_updaterate 100"
alias "rate60" "rate 60000; cl_cmdrate 60; cl_updaterate 60"
alias "rate30" "rate 30000; cl_cmdrate 30; cl_updaterate 30"

// ================================
// Interpolation ratio
// ================================
alias "interp0" "cl_interp_ratio 0"
alias "interp1" "cl_interp_ratio 1"
alias "interp2" "cl_interp_ratio 2"

// ================================
// Network settings shortcuts
// ================================
//
// Competitive settings
alias "comp" "lerp0; rate100; interp0"
// Valve server settings
alias "valve" "lerp100; rate30; interp1"

// ================================
// Set rates and lerp combo
// ================================
alias "ratesplay" "lerp0; rate100; interp0"
alias "ratesspec" "lerp100; rate30; interp0"

// If you hear player ping on game start,
// that means that everything will be ok
play "buttons/blip2"

echo "Loaded autoexec.cfg"
host_writeconfig
