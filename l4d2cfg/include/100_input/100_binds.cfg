// ================================
// UI
// ================================
bind "ESCAPE" "cancelselect"

// ================================
// Voting
// ================================
bind "F1" "Vote Yes"
bind "F2" "Vote No"
bind "F3" "askconnect_accept"

// ================================
// Scoreboard
// ================================
bind "TAB" "+showscores_netgraph"

// ================================
// Comms
// ================================
bind "v" "voice_toggle"
bind "c" "+voicerec"
// Team chat
bind "ENTER" "messagemode2"
