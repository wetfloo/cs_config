echo ":: Loading keybinds..."

// ================================
// Inventory inputs
// ================================
// Primary
bind "1" "slot1"
// Secondary
bind "2" "slot2"
// Grenades
bind "ALT" "slot3"
// First aid/defib
bind "4" "slot4"
// Pills/adrenaline
bind "5" "slot5"
bind "a" "spraylogo"
bind "MOUSE4" "+quickpilleat"
bind "MOUSE3" "flashlight_toggle"
bind "x" "+quickheal"
bind "z" "+quickhealother"

// ================================
// Run, think, shoot, live
// ================================
bind "e" "+forward_"
bind "s" "+left_"
bind "d" "+back_"
bind "f" "+right_"
bind "r" "+use"
bind "t" "+reload"
bind "SHIFT" "+speed_"
bind "SPACE" "+jump_"
bind "MWHEELUP" "+jump"
bind "CTRL" "+duck_"
bind "MOUSE1" "+attack_"
bind "MOUSE2" "+zoom_"
