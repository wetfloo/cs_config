// Inventory inputs
bind "1" "slot1"
bind "2" "slot2"
bind "ALT" "slot3"
bind "4" "slot4"
bind "5" "slot5"
bind "a" "spraylogo"
bind "MOUSE4" "+quickpilleat"
bind "MOUSE3" "toggleflashlight"
bind "x" "+quickheal"
bind "z" "+quickhealother"

// Run, think, shoot, live
bind "e" "+forward_"
bind "s" "+left_"
bind "d" "+back_"
bind "f" "+right_"
bind "r" "+use"
bind "t" "+reload"
bind "SHIFT" "+speed_"
bind "SPACE" "+jump_"
bind "MWHEELUP" "+jump"
bind "CTRL" "+duck_"
bind "MOUSE1" "+attack_"
bind "MOUSE2" "+zoom_"
bind "MOUSE5" "+attack2_" // Shove back the infected
bind "g" "+attack2_"

// UI
bind "ESCAPE" "cancelselect"

// Voting
bind "F1" "Vote Yes"
bind "F2" "Vote No"
bind "F3" "askconnect_accept"

// Scoreboard
bind "TAB" "+showscores_netgraph"

// Comms
bind "v" "voice_toggle"
bind "c" "+voicerecord"
bind "ENTER" "messagemode2" // Team chat
bind "'" "messagemode" // Global chat

// Misc
bind "F5" "toggleconsole"
