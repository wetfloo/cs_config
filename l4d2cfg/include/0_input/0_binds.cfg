// Aliases
alias "spraylogo" "impulse 201"

// Inventory inputs
bind "1" "slot1"
bind "2" "slot2"
bind "4" "slot4"
bind "5" "slot5"

// Run, think, shoot, live
bind "e" "+forward_"
bind "s" "+left_"
bind "d" "+back_"
bind "f" "+right_"
bind "r" "+use"
bind "t" "+reload"
bind "a" "spraylogo"

// UI
bind "ESCAPE" "cancelselect"

// Comms
bind "v" "voice_toggle"
alias "voice_on" "exec l4d2cfg/include/function/voice_on.cfg; alias voice_toggle voice_off"
alias "voice_off" "exec l4d2cfg/include/function/voice_off.cfg; alias voice_toggle voice_on"
voice_off
bind "c" "+voicerecord"
bind "ENTER" "messagemode2" // Team chat
bind "'" "messagemode" // Global chat
