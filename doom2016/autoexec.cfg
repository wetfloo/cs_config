configVersion 7
// ================
// Singleplayer binds
// ================
bindset 0
unbindall
bind "ESCAPE" "toggleMainMenu"
bind "E" "_moveforward"
bind "S" "_moveLeft"
bind "D" "_moveback"
bind "F" "_moveRight"
bind "LCTRL" "_crouch"
bind "TAB" "_inventory"
bind "SPACE" "_jump"
bind "MWHEELUP" "_jump"
bind "RCTRL" "_objectives"
bind "MOUSE1" "_attack1"
bind "MOUSE2" "_zoom _altfire"
bind "MOUSE3" "_changeWeapon"
// Swap weapon mod
bind "MOUSE4" "_reload"
// Chainsaw
bind "MWHEELDOWN" "_quick3"
// Melee
bind "G" "_attack2 _use"
// Pistol
bind "1" "_weap0"
bind "2" "_weap0"
// Shotgun
bind "4" "_weap1"
// Plasma
bind "R" "_weap2"
// Rifle
bind "C" "_weap3"
// Rocket Launcher
bind "V" "_weap4"
// Super Shotgun
bind "X" "_weap5"
// Gauss
bind "W" "_weap6"
// Chaingun
bind "Q" "_weap7"
// BFG
bind "H" "_supermeter"
// Next grenade
bind "LALT" "_quick0"
// Throw grenade
bind "MOUSE5" "_quickuse"

m_smooth 0
m_smoothing 0
r_swapInterval 0
m_sensitivity 0.25
m_pitch 0.022
m_yaw 0.022
g_fov 120
