echo ":: Loading keybinds..."

// ================================
// Inventory inputs
// ================================
bind "1" "wpn_primary"
bind "2" "wpn_secondary"
bind "4" "wpn_melee"
bind "5" "wpn_bomb"
bind "a" "spraylogo"
bind "MOUSE5" "wpn_he"
bind "z" "wpn_flash"
bind "x" "wpn_smoke"

// ================================
// Run, think, shoot, live
// ================================
bind "e" "+forward"
bind "s" "+moveleft"
bind "d" "+back"
bind "f" "+moveright"
bind "r" "+use"
bind "t" "+reload"
bind "SHIFT" "+speed"
bind "SPACE" "+jump"
bind "MWHEELUP" "+jump"
bind "CTRL" "+duck"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "g" "drop"

// ================================
// Buy
// ================================
bind "b" "buymenu"
bind "F3" "autobuy"
bind "F4" "rebuy"
bind "," "buyammo1"
bind "." "buyammo2"

// ================================
// UI
// ================================
bind "ESCAPE" "cancelselect"

// ================================
// Scoreboard
// ================================
bind "TAB" "+showscores_netgraph"

// ================================
// Comms
// ================================
bind "v" "voice_toggle"
bind "c" "+voicerec"
// Team chat
bind "ENTER" "messagemode2"
// Global chat
bind "'" "messagemode"

// ================================
// Misc
// ================================
bind "F5" "toggleconsole"

echo ":: Keybinds loaded!"
