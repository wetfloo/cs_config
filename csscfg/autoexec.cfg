// NOTICE: Any alias commented with `// !!`
// needs to be executed on the spot
// to make toggles work correctly

// Enable dev console
con_enable 1

exec csscfg/include/100_input/main.cfg
exec csscfg/include/200_hud/main.cfg
exec csscfg/include/300_sound/main.cfg
exec csscfg/include/400_misc/main.cfg

// ================================
// Convenience commands
// ================================
alias "reexec" "exec csscfg/autoexec.cfg"
alias "disc" "reexec;disconnect"
// Easier to remember than random numbers in impulse command
alias "spraylogo" "impulse 201"

// ================================
// Inventory
// ================================
alias "wpn_primary" "cl_righthand 0;slot1"
alias "wpn_secondary" "cl_righthand 0;slot2"
alias "wpn_melee" "cl_righthand 1;slot3"
alias "wpn_grenades" "slot4"
alias "wpn_bomb" "slot5"
alias "wpn_smoke" "use weapon_smokegrenade"
alias "wpn_flash" "use weapon_flashbang"
alias "wpn_he" "use weapon_hegrenade"

// ================================
// Set autobuy
// ================================
cl_autobuy "vesthelm vest m4a1 ak47 famas galilar mp5 smokegrenade flashbang defuser hegrenade flashbang"

// ================================
// Show the game's netgraph (when tabbing)
// ================================
alias "telemetry_full" "exec csscfg/include/function/telemetry_full.cfg"
// !!
alias "telemetry_clean" "exec csscfg/include/function/telemetry_clean.cfg"
telemetry_clean
alias "+showscores_netgraph" "+showscores;telemetry_full"
alias "-showscores_netgraph" "-showscores;telemetry_clean"

// ================================
// Sound
// ================================
// !!
alias "music_toggle" "music_on"
alias "music_on" "snd_musicvolume 0.5;alias "music_toggle" "music_off";echo "Music enabled.""
alias "music_off" "snd_musicvolume 0.0;alias "music_toggle" "music_on";echo "Music disabled.""
music_toggle
// !!
alias "voice_toggle" "voice_off"
alias "voice_on" "exec csscfg/include/function/voice_on.cfg;alias voice_toggle voice_off;echo "Voice enabled.";play ui/beep_error01"
alias "voice_off" "exec csscfg/include/function/voice_off.cfg;alias voice_toggle voice_on;echo "Voice disabled.";play ui/beepclear"
voice_toggle
// !!
alias "volume_toggle" "volume_on"
alias "volume_on" "volume 0.8;alias "volume_toggle" "volume_off";echo "Game sound enabled.""
alias "volume_off" "volume 0.0;exec csscfg/include/function/voice_off.cfg;alias "volume_toggle" "volume_on";echo "Game sound disabled.""
volume_toggle

// ================================
// Practice
// ================================
alias "clear_util" "exec csscfg/include/function/clear_util.cfg"
alias "practice" "exec csscfg/include/function/practice.cfg"

// If you hear player ping on game start,
// that means that everything will be ok
play "buttons/blip2"

echo "Loaded autoexec.cfg"
host_writeconfig
